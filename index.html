<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI UC Store - Fast Delivery</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0b0b0b; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #f39c12; box-shadow: 0 0 20px rgba(243, 156, 18, 0.2); }
        h2 { color: #f39c12; text-transform: uppercase; letter-spacing: 2px; }
        .pack-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .pack { background: #222; padding: 15px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .pack:hover { background: #2a2a2a; border-color: #f39c12; }
        .pack.active { background: #333; border-color: #f39c12; box-shadow: inset 0 0 10px rgba(243, 156, 18, 0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; background: #f39c12; color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; }
        #payment-section { display: none; margin-top: 25px; border-top: 1px dashed #444; padding-top: 20px; animation: fadeIn 0.5s; }
        .qr-box { background: #fff; padding: 10px; border-radius: 15px; width: 220px; margin: 15px auto; }
        .qr-box img { width: 100%; border-radius: 5px; }
        .step-txt { font-size: 13px; color: #aaa; margin: 5px 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>BGMI UC STORE</h2>
    <p style="color: #888; font-size: 14px;">Select Pack & Top-up Instantly</p>

    <div class="pack-list">
        <div class="pack" onclick="selectPack(this, '60 UC', '75')">60 UC<br><b>₹75</b></div>
        <div class="pack" onclick="selectPack(this, '325 UC', '380')">325 UC<br><b>₹380</b></div>
        <div class="pack" onclick="selectPack(this, '660 UC', '750')">660 UC<br><b>₹750</b></div>
        <div class="pack" onclick="selectPack(this, '1800 UC', '1900')">1800 UC<br><b>₹1900</b></div>
    </div>

    <input type="text" id="charID" placeholder="Enter BGMI Character ID" required>
    <input type="text" id="whatsappNum" placeholder="Your Contact Number" required>
    
    <button class="btn" onclick="openPayment()">PROCEED TO CHECKOUT</button>

    <div id="payment-section">
        <p style="font-size: 18px;">Total Payable: <b style="color:#f39c12;">₹<span id="priceDisplay">0</span></b></p>
        <div class="qr-box">
            <img src="https://i.ibb.co/hR8YpYv/your-qr-image.png" alt="Scan QR" id="qrImg">
        </div>
        <p class="step-txt">1. Scan QR and pay the amount.</p>
        <p class="step-txt">2. Screenshot le kar WhatsApp par bhejein.</p>
        <button class="btn" style="background: #25d366; color: #fff;" onclick="sendWhatsApp()">SEND SCREENSHOT (WHATSAPP)</button>
    </div>
</div>

<script>
    let selectedUC = "";
    let selectedPrice = "";

    // Image check: Agar aap image file use karein toh yahan naam badal dena
    const qrSource = "https://i.postimg.cc/mD7XFm07/Screenshot-2026-04-26-10-18-51-90-944a2809ea1b4cda6ef12d1db9048ed3.jpg";
    document.getElementById('qrImg').src = qrSource;

    function selectPack(el, uc, price) {
        document.querySelectorAll('.pack').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        selectedUC = uc;
        selectedPrice = price;
    }

    function openPayment() {
