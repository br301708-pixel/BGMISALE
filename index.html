<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI HYPER-REAL | Viral UC Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Bebas+Neue&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body, html {
            height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Scroll reels style mein */
        }

        /* 🎥 REAL BACKGROUND VIDEO (LOBBY CINEMATIC) */
        /* Maine yahan ek placeholder cinematic link dala hai. Aap yahan apna 15-sec video link laga sakte hain */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.3) contrast(1.1); /* Video dark taaki content chamke */
            animation: fadeInVideo 2s ease;
        }

        /* Gradient Overlay for Text Visibility */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%);
            z-index: -1;
        }

        @keyframes fadeInVideo { from { opacity: 0; } to { opacity: 1; } }

        /* Reel Container */
        .reel-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .reel {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Space for Top, Middle, Bottom */
            padding: 100px 20px;
        }

        /* Top Header */
        .header {
            position: fixed;
            top: 20px; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            z-index: 10;
        }

        .logo { 
            font-family: 'Orbitron'; 
            color: #f39c12; 
            font-size: 22px; 
            text-shadow: 0 0 10px rgba(243, 156, 18, 0.7);
        }

        .coin-balance {
            background: rgba(0,0,0,0.6);
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            font-family: 'Orbitron';
            color: #f1c40f;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 📸 MIDDLE SECTION: ANIMATED UC PHOTOS */
        .product-display {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50vh;
        }

        .uc-photo {
            width: 70%;
            max-width: 300px;
            filter: drop-shadow(0 0 20px rgba(243, 156, 18, 0.8));
            animation: ucGlow 2s infinite alternate ease-in-out;
        }

        @keyframes ucGlow {
            from { transform: scale(1) translateY(0px); filter: drop-shadow(0 0 15px rgba(243, 156, 18, 0.6)); }
            to { transform: scale(1.05) translateY(-10px); filter: drop-shadow(0 0 30px rgba(243, 156, 18, 1)); }
        }

        /* Product Info */
        .product-info {
            max-width: 80%;
            animation: slideUp 0.6s ease-out;
            margin-bottom: 20px;
        }

        .product-info h2 {
            font-family: 'Bebas Neue', cursive;
            font-size: 4rem;
            letter-spacing: 2px;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 1);
            line-height: 1;
        }

        .price-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            color: #f39c12;
            margin-bottom: 18px;
            font-weight: bold;
        }

        .buy-now-btn {
            background: linear-gradient(90deg, #f39c12 0%, #e67e22 100%);
            color: #000;
            border: none;
            padding: 16px 45px;
            font-size: 19px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.6);
            text-transform: uppercase;
            transition: 0.3s;
            font-family: 'Poppins';
        }

        .buy-now-btn:active { transform: scale(0.95); }

        /* UI Elements Like Reels */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 140px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .action-icon {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            padding: 16px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            text-align: center;
        }

        .action-icon span { font-size: 11px; display: block; margin-top: 5px; color: #f39c12; font-weight: bold; }

        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Popup Form */
        .modal {
            display: none;
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 75%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px);
            border-top: 4px solid #f39c12;
            border-radius: 35px 35px 0 0;
            padding: 35px;
            z-index: 1000;
            animation: slideIn 0.35s ease-out;
        }

        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input {
            width: 100%; padding: 16px; margin: 12px 0;
            background: rgba(40,40,40,0.7); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; border-radius: 12px; font-size: 16px;
        }
        
        #ytTaskBtn {
            background: #c0392b; color: white; padding: 10px; margin-top: 15px; border-radius: 8px; border: none; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

<img class="video-bg" src="https://i.postimg.cc/qR95T7L7/bgmi-lobby.jpg" alt="BGMI Lobby">
<div class="overlay"></div>

<div class="header">
    <div class="logo">GAMERHUB.PRO</div>
    <div class="coin-balance">🪙 <span>5,000</span></div>
</div>

<div class="reel-container">
    
    <div class="reel">
        <div class="product-display">
            <img src="https://i.postimg.cc/zX8yP3mP/uc-stack-small.png" class="uc-photo" alt="60 UC Stack">
        </div>
        <div class="product-info">
            <h2>60 UC</h2>
            <div class="price-tag">₹75.00</div>
            <button class="buy-now-btn" onclick="openOrder('60 UC', '75')">ORDER NOW</button>
        </div>
        <div class="side-actions">
            <div class="action-icon">🔥<span>1.8k</span></div>
            <div class="action-icon">💬<span>510</span></div>
            <div class="action-icon" onclick="share()">🔗<span>Share</span></div>
        </div>
    </div>

    <div class="reel">
        <div class="product-display">
            <img src="https://i.postimg.cc/zX8yP3mP/uc-pile-mid.png" class="uc-photo" alt="325 UC Pile">
        </div>
        <div class="product-info">
            <h2>325 UC</h2>
            <div class="price-tag">₹380.00</div>
            <button class="buy-now-btn" onclick="openOrder('325 UC', '380')">ORDER NOW</button>
        </div>
        <div class="side-actions">
            <div class="action-icon">🔥<span>7.5k</span></div>
            <div class="action-icon">💬<span>1.1k</span></div>
            <div class="action-icon" onclick="share()">🔗<span>Share</span></div>
        </div>
    </div>

    <div class="reel">
        <div class="product-display">
            <img src="https://i.postimg.cc/zX8yP3mP/uc-crate-big.png" class="uc-photo" alt="660 UC Crate">
        </div>
        <div class="product-info">
            <h2 style="color: #f1c40f;">660 UC</h2>
            <div class="price-tag">₹750.00</div>
            <button class="buy-now-btn" onclick="openOrder('660 UC', '750')">ORDER NOW</button>
        </div>
        <div class="side-actions">
            <div class="action-icon">🔥<span>15k</span></div>
            <div class="action-icon">💬<span>2.2k</span></div>
            <div class="action-icon" onclick="share()">🔗<span>Share</span></div>
        </div>
    </div>

</div>

<div class="modal" id="orderModal">
    <div style="width: 60px; height: 6px; background: rgba(255,255,255,0.15); margin: 0 auto 25px; border-radius: 10px;"></div>
    <h2 id="modalTitle" style="font-family:'Bebas Neue'; font-size:3rem; color:#00d4ff;">Order Details</h2>
    <p id="modalPrice" style="color: #f39c12; font-family:'Orbitron'; font-size:22px; margin-bottom: 25px;"></p>
    
    <input type="number" id="charID" placeholder="BGMI Character ID (10 Digits)">
    <input type="number" id="phone" placeholder="WhatsApp Number">
    
    <button class="buy-now-btn" style="width: 100%; margin-top: 25px; padding: 18px;" onclick="confirmOrder()">CONFIRM & PAY</button>
    <button onclick="closeModal()" style="width: 100%; background: none; color: #888; border: none; margin-top: 15px; cursor:pointer;">Go Back</button>
    
    <button id="ytTaskBtn" onclick="openYTSite()">Subscribe for Bonus Coins</button>
</div>

<script>
    let selectedPack = "";
    let selectedPrice = "";

    function openOrder(pack, price) {
        selectedPack = pack;
        selectedPrice = price;
        document.getElementById('modalTitle').innerText = "CLAIM: " + pack;
        document.getElementById('modalPrice').innerText = "AMOUNT: ₹" + price;
        document.getElementById('orderModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('orderModal').style.display = 'none';
    }

    function confirmOrder() {
        const id = document.getElementById('charID').value;
        const num = document.getElementById('phone').value;
        if(id.length < 5 || num.length < 10) {
            alert("⚠️ Sahi ID aur WhatsApp Number dalein!");
            return;
        }
        
        // **IMPORTANT:** Replace with your actual number (e.g., 919876543210)
        const msg = `*🚀 NEW REEL STORE ORDER*%0A---%0A*Pack:* ${selectedPack}%0A*Price:* ₹${selectedPrice}%0A*Character ID:* ${id}%0A*WhatsApp:* ${num}`;
        window.open(`https://wa.me/91XXXXXXXXXX?text=${msg}`); // Yahan number dalein
    }

    function share() { alert("🔗 Link copied! Doston ko refer karke Coins kamayein."); }
    function openYTSite() { window.open("https://youtube.com/@YourChannel", '_blank'); }
</script>

</body>
</html>
