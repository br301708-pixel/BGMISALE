<!DOCTYPE html>
<html>
<head>
<title>BGMI Rewards claim and get </title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: pink;
    color: white;
    text-align: center;
}

/* Title */
h1 {
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
}

/* Box */
.box {
    margin-top: 80px;
}

/* Input */
input {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

/* Button */
.btn {
    padding: 10px 20px;
    background: black;
    border: none;
    border-radius: 20px;
    color: black ;
    cursor: pointer;
}

/* Gift Box */
.gift {
    font-size: 80px;
    cursor: pointer;
    margin-top: 20px;
}

#reward {
    display: none;
    margin-top: 20px;
    color: lime;
}
</style>

</head>

<body>

<div class="box">

<h1>🎮 BGMI Rewards</h1>

<p>Enter your Player ID to check rewards</p>

<input type="text" id="pid" placeholder="Enter ID">

<br><br>

<button class="btn" onclick="next()">Continue</button>

<div id="game" style="display:none;">
    <h2>🎁 Tap Gift</h2>
    <div class="gift" onclick="openBox()">🎁</div>
</div>

<div id="reward">✅ Reward Claimed Successfully!</div>

</div>

<script>
function next() {
    let id = document.getElementById("pid").value;

    if(id === "") {
        alert("Enter ID first!");
        return;
    }

    alert("Processing...");
    document.getElementById("game").style.display = "block";
}

function openBox() {
    document.getElementById("reward").style.display = "block";
}
</script>

</body>
</html>
