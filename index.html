<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI Official Recharge | Codashop Style</title>
    <style>
        :root {
            --main-bg: #111;
            --box-bg: #222c38;
            --accent: #f39c12;
            --text-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

        body {
            background-image: url('https://i.ibb.co/Xz9J2wH/227ce-16365525819565-1920.webp');
            background-size: cover;
            background-position: top center;
            background-attachment: fixed;
            color: var(--text-white);
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: -1;
        }

        .navbar { background: #23272b; padding: 15px 5%; border-bottom: 3px solid var(--accent); }
        .navbar .logo { font-size: 24px; font-weight: bold; color: var(--accent); }

        .container { max-width: 800px; margin: 30px auto; padding: 0 15px; }

        .step-box {
            background: var(--box-bg); border-radius: 8px; padding: 25px;
            margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative;
        }

        .step-number {
            position: absolute; top: -15px; left: 20px; background: var(--accent);
            color: #000; width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .step-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; display: block; }

        input[type="number"] {
            width: 100%; padding: 15px; border-radius: 5px; border: 2px solid #3e4b5b;
            background: #1a222b; color: white; font-size: 16px; outline: none;
        }

        .uc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        .uc-item {
            background: #1a222b; border: 1px solid #3e4b5b; border-radius: 8px;
            padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.2s;
        }

        .uc-item.active { background: rgba(243, 156, 18, 0.1); border: 2px solid var(--accent); }

        .uc-item img { width: 40px; margin-bottom: 10px; }
        .uc-val { display: block; font-weight: bold; font-size: 18px; }
        .uc-price { color: #8899a6; font-size: 14px; }

        .pay-option {
            background: #1a222b; border: 1px solid #3e4b5b; padding: 15px;
            border-radius: 8px; display: flex; align-items: center; gap: 15px;
        }

        .buy-now-area { background: var(--box-bg); padding: 20px; border-radius: 8px; text-align: center; }

        .btn-order {
            background: var(--accent); color: #000; border: none; padding: 18px 0;
            width: 100%; font-size: 20px; font-weight: bold; border-radius: 5px;
            cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="navbar"><div class="logo">GAMERHUB SHOP</div></div>

<div class="container">
    <div class="step-box">
        <div class="step-number">1</div>
        <span class="step-title">Enter Character ID</span>
        <input type="number" id="charID" placeholder="Enter Player ID (Ex: 5123456789)">
    </div>

    <div class="step-box">
        <div class="step-number">2</div>
        <span class="step-title">Select Recharge</span>
        <div class="uc-grid">
            <div class="uc-item" onclick="selectItem(this, '60 UC', '75')">
                <img src="https://www.pubgmobile.com/common/images/icon_uc.png" alt="uc">
                <span class="uc-val">60 UC</span><span class="uc-price">₹75.00</span>
            </div>
            <div class="uc-item" onclick="selectItem(this, '325 UC', '380')">
                <img src="https://www.pubgmobile.com/common/images/icon_uc.png" alt="uc">
                <span class="uc-val">325 UC</span><span class="uc-price">₹380.00</span>
            </div>
            <div class="uc-item" onclick="selectItem(this, '660 UC', '750')">
                <img src="https://www.pubgmobile.com/common/images/icon_uc.png" alt="uc">
                <span class="uc-val">660 UC</span><span class="uc-price">₹750.00</span>
            </div>
            <div class="uc-item" onclick="selectItem(this, '1800 UC', '1900')">
                <img src="https://www.pubgmobile.com/common/images/icon_uc.png" alt="uc">
                <span class="uc-val">1800 UC</span><span class="uc-price">₹1900.00</span>
            </div>
        </div>
    </div>

    <div class="step-box">
        <div class="step-number">3</div>
        <span class="step-title">Payment Method</span>
        <div class="pay-option">
            <img src="https://img.icons8.com/color/48/000000/upi.png" width="30">
            <span>UPI Apps (PhonePe, GPay, Paytm)</span>
        </div>
    </div>

    <div class="buy-now-area">
        <button class="btn-order" onclick="initiatePayment()">Pay & Recharge Now</button>
    </div>
</div>

<script>
    let selectedUC = "";
    let selectedPrice = "";

    function selectItem(element, uc, price) {
        document.querySelectorAll('.uc-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        selectedUC = uc;
        selectedPrice = price;
