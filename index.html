<!DOCTYPE html>
<html>
<head>
<title>Gaming Zone</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    text-align: center;
}

/* Navbar */
.navbar {
    background: #111;
    padding: 15px;
}
.navbar h1 {
    color: lime;
}

/* Hero Section */
.hero {
    padding: 100px 20px;
    background: url('https://images.unsplash.com/photo-1605902711622-cfb43c4437d1') no-repeat center;
    background-size: cover;
}
.hero h2 {
    font-size: 40px;
    color: #00ffcc;
}

/* Button */
.btn {
    padding: 12px 25px;
    background: red;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}
.btn:hover {
    background: orange;
}

/* Cards */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    padding: 20px;
}
.card {
    background: #222;
    margin: 10px;
    padding: 20px;
    width: 200px;
    border-radius: 10px;
}
.card:hover {
    transform: scale(1.05);
    transition: 0.3s;
}

/* Footer */
.footer {
    background: #111;
    padding: 10px;
    margin-top: 20px;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h1>🎮 GAMING ZONE</h1>
</div>

<!-- Hero -->
<div class="hero">
    <h2>Welcome Gamer 🔥</h2>
    <p>Play. Win. Repeat.</p>
    <button class="btn" onclick="alert('Game Start Soon!')">Start Game</button>
</div>

<!-- Games Section -->
<h2>🔥 Popular Games</h2>

<div class="container">
    <div class="card">
        <h3>BGMI</h3>
        <p>Battle Royale Action</p>
    </div>

    <div class="card">
        <h3>Free Fire</h3>
        <p>Fast Survival Game</p>
    </div>

    <div class="card">
        <h3>Call of Duty</h3>
        <p>War Shooting Game</p>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 Gaming Zone</p>
</div>

</body>
</html>
