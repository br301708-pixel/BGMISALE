<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerHub Pro | Ultimate UC Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff; /* Cyber Blue */
            --secondary: #f39c12; /* Gold */
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --neon-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Animated Background Gradient */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #101827 0%, #050505 100%);
            z-index: -1;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 5%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0; z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            text-shadow: var(--neon-shadow);
        }

        /* Live Feed Ticker (Right Side) */
        .live-feed {
            position: fixed;
            right: 0; top: 100px;
            width: 200px;
            background: rgba(0, 0, 0, 0.6);
            border-left: 2px solid var(--primary);
            padding: 10px;
            font-size: 11px;
            z-index: 90;
            border-radius: 10px 0 0 10px;
        }

        .feed-item {
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #222;
            animation: fadeIn 1s ease;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* UC Grid */
        .container { max-width: 1200px; margin: auto; padding: 20px; }

        .uc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .uc-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            position: relative;
            transition: 0.4s;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .uc-card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: var(--neon-shadow);
        }

        .uc-card::after {
            content: "FAST DELIVERY";
            position: absolute;
            top: 10px; right: -30px;
            background: var(--secondary);
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 5px 40px;
            transform: rotate(45deg);
        }

        .uc-icon { width: 100px; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--secondary)); }

        .price { font-size: 28px; font-weight: bold; margin: 15px 0; color: var(--primary); }

        .buy-btn {
            background: linear-gradient(45deg, var(--primary), #0081ff);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
        }

        .buy-btn:hover { letter-spacing: 2px; box-shadow: 0 0 20px var(--primary); }

        /* Order Form Modal */
        #orderModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            width: 90%; max-width: 400px;
            text-align: center;
        }

        input {
            width: 100%; padding: 15px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #333;
            color: #fff; border-radius: 10px; box-sizing: border-box;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
