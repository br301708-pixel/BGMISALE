<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI REEL STORE | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Bebas+Neue&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* 🎥 VIDEO BACKGROUND (YouTube Embed) */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .video-background iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            min-height: 100vh;
            min-width: 177.77vh; /* Aspect ratio control */
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            filter: brightness(0.4) contrast(1.2) blur(2px);
        }

        /* Dark Gradient for Text Visibility */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.8) 90%);
            z-index: -1;
        }

        /* Reel Container */
        .reel-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .reel-container::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome */

        .reel {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 25px 120px 25px;
        }

        /* Animated UC Images */
        .uc-img-container {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            animation: float 3s infinite alternate ease-in-out;
            z-index: 1;
        }

        @keyframes float {
            from { transform: translate(-50%, -45%); filter: drop-shadow(0 0 10px #f39c12); }
            to { transform: translate(-50%, -55%); filter: drop-shadow(0 0 30px #f39c12); }
        }

        /* Header */
        .header {
            position: fixed;
            top: 25px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 25px; z-index: 100;
        }
        .logo { font-family: 'Orbitron'; color: #f39c12; font-size: 22px; text-shadow: 0 0 10px #000; }

        /* Product Info */
        .info-box h2 {
            font-family: 'Bebas Neue';
            font-size: 4.5rem;
            color: #00d4ff;
            text-shadow: 2px 2px 15px rgba(0,212,255,0.8);
            line-height: 1;
        }
        .price { font-family: 'Orbitron'; font-size: 24px; color: #f1c40f; margin: 10px 0 20px; }

        .btn-buy {
            background: linear-gradient(90deg, #f39c12, #e67e22);
            border: none; padding: 18px 50px;
            color: #000; font-weight: bold; font-size: 20px;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
            text-transform: uppercase;
        }

        /* Side Actions (Reels Style) */
        .side-bar {
            position: absolute; right: 15px; bottom: 150px;
            display: flex; flex-direction: column; gap: 25px;
        }
        .icon {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
        }
        .icon span { font-size: 10px; display: block; color: #f39c12; }

        /* Popup Form */
        .modal {
            display: none; position: fixed; bottom: 0; width: 100%; height: 70%;
            background: rgba(15,15,15,0.98); border-top: 4px solid #f39c12;
            border-radius: 30px 30px 0 0; padding: 40px 25px; z-index: 1000;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        input { width: 100%; padding: 16px; margin: 12px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/pYIgh6N_k78?autoplay=1&mute=1&controls=0&loop=1&playlist=pYIgh6N_k78&showinfo=0&rel=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="overlay"></div>

    <div class="header">
        <div class="logo">GAMERHUB.UC</div>
        <div style="background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px;">🪙 12,400</div>
    </div>

    <div class="reel-container">
        
        <div class="reel">
            <div class="uc-img-container">
                <img src="https://i.postimg.cc/zX8yP3mP/uc-stack.png" width="100%" alt="UC">
            </div>
            <div class="info-box">
                <h2>60 UC</h2>
                <div class="price">₹75.00</div>
                <button class="btn-buy" onclick="openOrder('60 UC', '75')">CLAIM NOW</button>
            </div>
            <div class="side-bar">
                <div class="icon">🔥<span>2.5k</span></div>
                <div class="icon">💬<span>120</span></div>
                <div class="icon">🔗<span>Share</span></div>
            </div>
        </div>

        <div class="reel">
            <div class="uc-img-container">
                <img src="https://i.postimg.cc/zX8yP3mP/uc-crate.png" width="100%" alt="UC">
            </div>
            <div class="info-box">
                <h2>325 UC</h2>
                <div class="price">₹380.00</div>
                <button class="btn-buy" onclick="openOrder('325 UC', '380')">CLAIM NOW</button>
            </div>
            <div class="side-bar">
                <div class="icon">🔥<span>8.1k</span></div>
                <div class="icon">💬<span>890</span></div>
                <div class="icon">🔗<span>Share</span></div>
            </div>
        </div>

    </div>

    <div class="modal" id="orderModal">
        <div style="width: 50px; height: 5px; background: #333; margin: 0 auto 30px; border-radius: 10px;"></div>
        <h2 id="modalTitle" style="font-family: 'Bebas Neue'; font-size: 3rem; color: #00d4ff;">ORDER UC</h2>
        <p id="modalPrice" style="color: #f39c12; font-family: 'Orbitron'; margin-bottom: 20px;"></p>
        
        <input type="number" id="charID" placeholder="BGMI Character ID">
        <input type="number" id="phone" placeholder="WhatsApp Number">
        
        <button class="btn-buy" style="width: 100%; margin-top: 20px;" onclick="confirmPay()">CONFIRM & PAY</button>
        <p onclick="closeModal()" style="text-align: center; margin-top: 20px; color: #777; cursor: pointer;">Cancel Order</p>
    </div>

    <script>
        let pack = "";
        let price = "";

        function openOrder(p, pr) {
            pack = p; price = pr;
            document.getElementById('modalTitle').innerText = "CLAIM: " + p;
            document.getElementById('modalPrice').innerText = "AMOUNT: ₹" + pr;
            document.getElementById('orderModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

        function confirmPay() {
            const id = document.getElementById('charID').value;
            if(id.length < 5) { alert("Sahi ID dalein!"); return; }
            
            // Replace with your WhatsApp Number
            const msg = `*NEW REEL ORDER*%0A*Pack:* ${pack}%0A*Price:* ₹${price}%0A*Character ID:* ${id}`;
            window.open(`https://wa.me/91XXXXXXXXXX?text=${msg}`);
        }
    </script>
</body>
</html>
