<div class="redeem-box">
    <h3>Redeem Your Rewards</h3>
    <p>Current Balance: <span id="userCoins">500</span> Coins</p>
    
    <select id="rewardType">
        <option value="60">60 UC (Needed: 1000 Coins)</option>
        <option value="325">325 UC (Needed: 5000 Coins)</option>
    </select>
    
    <input type="text" placeholder="Enter BGMI Character ID (e.g. 512345678)" id="targetID">
    <button onclick="requestRedeem()">Redeem Now</button>
</div>
