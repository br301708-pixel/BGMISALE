<!DOCTYPE html>
<html>
<head>
<title>Flipkart Clone</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f3f6;
}

/* NAVBAR */
.navbar {
    background: #2874f0;
    color: white;
    display: flex;
    align-items: center;
    padding: 10px;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    margin-right: 20px;
}

.search {
    flex: 1;
}

.search input {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 2px;
}

.nav-right {
    display: flex;
    gap: 15px;
    margin-left: 20px;
}

/* BANNER */
.banner {
    background: url('https://via.placeholder.com/1200x250') no-repeat center;
    height: 200px;
    background-size: cover;
}

/* PRODUCTS */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px;
}

.card {
    background: white;
    width: 180px;
    margin: 10px;
    padding: 10px;
    text-align: center;
    border-radius: 5px;
    transition: 0.3s;
}

.card:hover {
    box-shadow: 0 0 10px gray;
    transform: scale(1.03);
}

.card img {
    width: 100%;
}

.price {
    color: green;
    font-weight: bold;
}

/* BUTTON */
.btn {
    background: orange;
    border: none;
    padding: 8px;
    cursor: pointer;
    border-radius: 3px;
}

/* FOOTER */
.footer {
    background: #172337;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 20px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Flipkart</div>

    <div class="search">
        <input type="text" placeholder="Search for products...">
    </div>

    <div class="nav-right">
        <div>Login</div>
        <div>Cart</div>
    </div>
</div>

<div class="banner"></div>
