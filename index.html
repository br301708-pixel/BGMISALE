<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI REEL STORE | Viral UC Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Scroll reels style mein hoga */
        }

        /* Background Video/Image */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.4) contrast(1.2);
        }

        /* Reel Container */
        .reel-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }

        .reel {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 20px 100px 20px;
        }

        /* UI Elements Like Reels */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .action-icon {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            text-align: center;
        }

        .action-icon span { font-size: 10px; display: block; margin-top: 5px; color: #f39c12; }

        /* Product Info */
        .product-info {
            max-width: 80%;
            animation: slideUp 0.5s ease;
        }

        .product-info h2 {
            font-family: 'Bebas Neue', cursive;
            font-size: 3.5rem;
            letter-spacing: 2px;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }

        .price-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #f39c12;
            margin-bottom: 15px;
        }

        .buy-now-btn {
            background: linear-gradient(90deg, #f39c12, #e67e22);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.5);
            text-transform: uppercase;
        }

        /* Top Header */
        .header {
            position: fixed;
            top: 20px; width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }

        .logo { font-family: 'Orbitron'; color: #f39c12; font-size: 20px; }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Popup Form */
        .modal {
            display: none;
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 70%;
            background: #111;
            border-top: 3px solid #f39c12;
            border-radius: 30px 30px 0 0;
            padding: 30px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input {
            width: 100%; padding: 15px; margin: 10px 0;
            background: #222; border: 1px solid #444;
            color: #fff; border-radius: 12px;
        }
    </style>
</head>
<body>

<img class="video-bg" src="https://i.postimg.cc/qR95T7L7/bgmi-lobby.jpg" alt="BGMI Lobby">

<div class="header">
    <div class="logo">GAMERHUB REELS</div>
    <div style="background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px;">🪙 5,000</div>
</div>

<div class="reel-container">
    
    <div class="reel">
        <div class="product-info">
            <h2>60 UC</h2>
            <div class="price-tag">₹75.00</div>
            <button class="buy-now-btn" onclick="openOrder('60 UC', '75')">ORDER INSTANTLY</button>
        </div>
        <div class="side-actions">
            <div class="action-icon">🔥<span>1.2k</span></div>
            <div class="action-icon">💬<span>450</span></div>
            <div class="action-icon" onclick="share()">🔗<span>Share</span></div>
        </div>
    </div>

    <div class="reel">
        <div class="product-info">
            <h2>325 UC</h2>
            <div class="price-tag">₹380.00</div>
            <button class="buy-now-btn" onclick="openOrder('325 UC', '380')">ORDER INSTANTLY</button>
        </div>
        <div class="side-actions">
            <div class="action-icon">🔥<span>5.8k</span></div>
            <div class="action-icon">💬<span>890</span></div>
            <div class="action-icon" onclick="share()">🔗<span>Share</span></div>
        </div>
    </div>

    <div class="reel">
        <div class="product-info">
            <h2 style="color: #f1c40f;">ROYAL PASS</h2>
            <div class="price-tag">₹720.00</div>
            <button class="buy-now-btn" onclick="openOrder('Royal Pass', '720')">CLAIM NOW</button>
        </div>
        <div class="side-actions">
            <div class="action-icon">🔥<span>12k</span></div>
            <div class="action-icon">💬<span>1.2k</span></div>
            <div class="action-icon" onclick="share()">🔗<span>Share</span></div>
        </div>
    </div>

</div>

<div class="modal" id="orderModal">
    <div style="width: 50px; height: 5px; background: #444; margin: 0 auto 20px; border-radius: 10px;"></div>
    <h2 id="modalTitle">Order Details</h2>
    <p id="modalPrice" style="color: #f39c12; margin-bottom: 20px;"></p>
    
    <input type="number" id="charID" placeholder="BGMI Character ID">
    <input type="number" id="phone" placeholder="WhatsApp Number">
    
    <button class="buy-now-btn" style="width: 100%; margin-top: 20px;" onclick="confirmOrder()">CONFIRM & PAY</button>
    <button onclick="closeModal()" style="width: 100%; background: none; color: #888; border: none; margin-top: 15px;">Go Back</button>
</div>

<script>
    let selectedPack = "";
    let selectedPrice = "";

    function openOrder(pack, price) {
        selectedPack = pack;
        selectedPrice = price;
        document.getElementById('modalTitle').innerText = "Buying: " + pack;
        document.getElementById('modalPrice').innerText = "Total: ₹" + price;
        document.getElementById('orderModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('orderModal').style.display = 'none';
    }

    function confirmOrder() {
        const id = document.getElementById('charID').value;
        const num = document.getElementById('phone').value;
        if(id.length < 5 || num.length < 10) {
            alert("Sahi ID aur Number dalein!");
            return;
        }
        
        const msg = `*REEL STORE ORDER*%0A---%0A*Pack:* ${selectedPack}%0A*Price:* ₹${selectedPrice}%0A*Character ID:* ${id}%0A*WhatsApp:* ${num}`;
        window.open(`https://wa.me/91XXXXXXXXXX?text=${msg}`); // Replace with your number
    }

    function share() {
        alert("Link copied! Share it with your friends for 10 bonus coins.");
    }
</script>

</body>
</html>
