<!DOCTYPE html>
<html>
<head>
<title>Claim Rewards</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: ORANGE ;
    color: white;
    text-align: center;
}

/* Glow Title */
h1 {
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
}

/* Container */
.box {
    margin-top: 100px;
}

/* Input */
input {
    padding: 12px;
    width: 250px;
    border: none;
    border-radius: 10px;
    margin: 10px;
}

/* Button */
.btn {
    padding: 12px 25px;
    background: red;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}
.btn:hover {
    background: orange;
}

/* Loading */
#loading {
    display: none;
    margin-top: 20px;
}

/* Success */
#success {
    display: none;
    color: lime;
    font-size: 20px;
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="box">
    <h2>🎁 Tap to open reward</h2>

<div class="gift-box" onclick="openBox()">
    🎁
</div>

<div id="reward" style="display:none; font-size: 24px; margin-top:20px;">
    💥 You got 500 UC! 💥
</div>


    <h1>🎁 Claim Your Rewards</h1>

    <p>Enter your Player ID</p>

    <input type="text" id="Id & PASS" placeholder=" ID $ PASS">

    <br>

    <button class="btn" onclick="claimReward()">Claim Now</button>

    <div id="loading">⏳ Processing...</div>

    <div id="success">✅ Reward Claimed Successfully!</div>

</div>

<script>
function claimReward() {
    var id = document.getElementById("playerId").value;

    if(id === "") {
        alert("Please enter your ID!");
        return;
    }

    document.getElementById("loading").style.display = "block";

    setTimeout(function() {
        document.getElementById("loading").style.display = "none";
        document.getElementById("success").style.display = "block";
    }, 2000);
}
</script>

</body>
</html>
