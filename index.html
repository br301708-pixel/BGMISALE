<!DOCTYPE html>
<html>
<head>
<title>Flipkart Ultra Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f1f3f6;
}

/* Navbar */
.navbar {
    background: #2874f0;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

input {
    padding: 8px;
    width: 150px;
}

/* Buttons */
.btn {
    background: orange;
    border: none;
    padding: 8px;
    cursor: pointer;
    border-radius: 5px;
    margin: 5px;
}

/* Products */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    width: 200px;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 100%;
}

.price {
    color: green;
}

/* Cart */
#cartBox {
    position: fixed;
    right: 10px;
    top: 60px;
    background: white;
    padding: 10px;
    width: 250px;
    display: none;
}

/* Wishlist */
#wishlistBox {
    position: fixed;
    left: 10px;
    top: 60px;
    background: white;
    padding: 10px;
    width: 250px;
    display: none;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div>🛒 Flipkart Ultra</div>
    <input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()">
    <div onclick="toggleWishlist()">❤️ Wishlist</div>
    <div onclick="toggleCart()">🛍️ Cart (<span id="count">0</span>)</div>
</div>

<!-- Products -->
<div class="container" id="products">

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Mobile</h3>
<p class="price">₹9999</p>
<button class="btn" onclick="addToCart('Mobile',9999)">Add</button>
<button class="btn" onclick="addToWishlist('Mobile')">❤️</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Headphones</h3>
<p class="price">₹999</p>
<button class="btn" onclick="addToCart('Headphones',999)">Add</button>
<button class="btn" onclick="addToWishlist('Headphones')">❤️</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Shoes</h3>
<p class="price">₹1999</p>
<button class="btn" onclick="addToCart('Shoes',1999)">Add</button>
<button class="btn" onclick="addToWishlist('Shoes')">❤️</button>
</div>

</div>

<!-- Cart -->
<div id="cartBox">
<h3>🛍️ Cart</h3>
<ul id="cartItems"></ul>
<p>Total ₹<span id="total">0</span></p>
<button class="btn" onclick="checkout()">Checkout</button>
</div>

<!-- Wishlist -->
<div id="wishlistBox">
<h3>❤️ Wishlist</h3>
<ul id="wishlistItems"></ul>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;

    document.getElementById("count").innerText = cart.length;
    document.getElementById("total").innerText = total;

    let li = document.createElement("li");
    li.innerText = name + " - ₹" + price;
    document.getElementById("cartItems").appendChild(li);
}

function toggleCart() {
    let box = document.getElementById("cartBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function addToWishlist(name) {
    let li = document.createElement("li");
    li.innerText = name;
    document.getElementById("wishlistItems").appendChild(li);
}

function toggleWishlist() {
    let box = document.getElementById("wishlistBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function checkout() {
    alert("Order placed successfully 🎉");

    // 👉 Payment link add karo yaha
    window.location.href = "PASTE_PAYMENT_LINK_HERE";
}

function searchProduct() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let name = card.innerText.toLowerCase();
        card.style.display = name.includes(input) ? "block" : "none";
    });
}
</script>

</body>
</html>
