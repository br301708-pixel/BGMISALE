<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerRewards - Dashboard</title>
    <style>
        :root {
            --primary: #f39c12;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 900px;
            margin: auto;
        }

        /* Top Header & Balance Card */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border-bottom: 3px solid var(--primary);
            margin-bottom: 25px;
        }

        .balance-box {
            text-align: right;
        }

        .coin-count {
            font-size: 24px;
            color: var(--primary);
            font-weight: bold;
        }

        /* Reward Grid */
        .reward-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .reward-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid #333;
        }

        .reward-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .reward-img {
            width: 80px;
            margin-bottom: 15px;
        }

        .reward-title {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .cost {
            color: #888;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Claim Form */
        .claim-section {
            margin-top: 40px;
            background: #222;
            padding: 25px;
            border-radius: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
        }

        .claim-btn {
            background: var(--primary);
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .claim-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .note {
            font-size: 12px;
            color: #ff4d4d;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <div>
            <h2 style="margin:0;">Welcome, Player!</h2>
            <p style="margin:0; font-size:14px; color:#aaa;">Complete tasks to earn more coins.</p>
        </div>
        <div class="balance-box">
            <div style="font-size:14px;">YOUR BALANCE</div>
            <div class="coin-count">🪙 1,250 Coins</div>
        </div>
    </div>

    <h3 style="margin-bottom: 20px;">Redeem Rewards</h3>

    <div class="reward-grid">
        <div class="reward-card">
            <img src="https://cdn-icons-png.flaticon.com/512/3534/3534033.png" class="reward-img" alt="UC">
            <div class="reward-title">60 UC Pack</div>
            <div class="cost">Costs: 1,000 Coins</div>
            <button class="claim-btn" onclick="selectReward('60 UC', 1000)">SELECT</button>
        </div>

        <div class="reward-card">
            <img src="https://cdn-icons-png.flaticon.com/512/3534/3534033.png" class="reward-img" alt="UC">
            <div class="reward-title">325 UC Pack</div>
            <div class="cost">Costs: 5,000 Coins</div>
            <button class="claim-btn" onclick="selectReward('325 UC', 5000)">SELECT</button>
        </div>
    </div>

    <div class="claim-section" id="claimForm" style="display:none;">
        <h3 id="selectedItemHeader">Claim: 60 UC</h3>
        <p>Enter your details correctly. Delivery takes 24-48 hours.</p>
        
        <label>BGMI Character ID</label>
        <input type="number" id="user login " placeholder="e.g. 5123456789">
        
        <label>WhatsApp Number (For Update)</label>
        <input type="number" id="userWA" placeholder=" password">
        
        <button class="claim-btn" onclick="processClaim()">CONFIRM REDEEM</button>
        <p class="note">⚠️ Note: Hum kabhi aapka password nahi maangte. Be safe!</p>
    </div>
</div>

<script>
    let currentSelectedReward = "";
    let currentCost = 0;
    let userBalance = 1250;

    function selectReward(name, cost) {
        currentSelectedReward = name;
        currentCost = cost;
        
        document.getElementById('selectedItemHeader').innerText = "Claiming: " + name;
        document.getElementById('claimForm').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function processClaim() {
        const charID = document.getElementById('charID').value;
        
        if(userBalance < currentCost) {
            alert("Insufficient Coins! Aur tasks complete karein.");
            return;
        }
        
        if(charID.length < 5) {
            alert("Please enter a valid Character ID.");
            return;
        }

        alert("Request Sent! " + currentSelectedReward + " will be sent to ID: " + charID + " after verification.");
        // Yahan aap apna database update karne ka code daal sakte hain
    }
</script>

</body>
</html>
