<!DOCTYPE html>
<html>
<head>
<title>My Shop</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f1f3f6;
}

/* Navbar */
.navbar {
    background: #2874f0;
    color: white;
    padding: 15px;
    font-size: 20px;
}

/* Products */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    width: 200px;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 100%;
}

.price {
    color: green;
    font-weight: bold;
}

/* Button */
.btn {
    background: orange;
    border: none;
    padding: 10px;
    cursor: pointer;
    border-radius: 5px;
}
</style>

</head>

<body>

<div class="navbar">🛒 My Shop</div>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h3>Mobile Phone</h3>
        <p class="price">₹9999</p>
        <button class="btn" onclick="buy()">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h3>Headphones</h3>
        <p class="price">₹999</p>
        <button class="btn" onclick="buy()">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h3>Shoes</h3>
        <p class="price">₹1999</p>
        <button class="btn" onclick="buy()">Buy Now</button>
    </div>

</div>

<script>
function buy() {
    alert("Order placed successfully!");
}
</script>

</body>
</html>
